services:
  # ── API Server ───────────────────────────────────────────────────────
  api:
    build: .
    container_name: agentforge-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/agentforge.db
      - CHROMA_PERSIST_DIR=/app/data/chroma_data
    volumes:
      - agentforge-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Dashboard ────────────────────────────────────────────────────────
  dashboard:
    build: .
    container_name: agentforge-dashboard
    command: [ "streamlit", "run", "dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0" ]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE=http://api:8000/api
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  agentforge-data:
  redis-data:
